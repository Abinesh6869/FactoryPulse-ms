spring.application.name=operation-service
server.port=9093

spring.datasource.url=jdbc:mysql://localhost:3306/factorypulse
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

jwt.secret=FactoryPulseSecretKeyUsedToHashPasswordsBetterToUseALongHashToEncrypt

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.client.registry-fetch-interval-seconds=30

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

internal.service.key=fp-internal-secret-key-2024
